---
name: main

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    uses: nathanwn/workflows/.github/workflows/tox.yml@46f87a62e7c43be8de7917ac94c794a115593ff9  # v0.7.0
    with:
      os: '["ubuntu-latest"]'
      env: '["pre-commit"]'

  test:
    uses: nathanwn/workflows/.github/workflows/tox.yml@46f87a62e7c43be8de7917ac94c794a115593ff9  # v0.7.0
    with:
      os: '["ubuntu-latest", "windows-latest", "macos-15"]'
      env: '["py311", "py312", "py313", "py314"]'

  test-parser:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
    defaults:
      run:
        working-directory: tree-sitter-souffle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Run tests
        run: npm run test
      - name: Run regression test
        run: npm run test_regression

  test-vscode-extension:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
    defaults:
      run:
        working-directory: vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - run: npm run lint
      - run: npm run compile
    # TODO(nathanwn): Figure out how to run e2e tests on GitHub Actions.
    # - run: npm run test
